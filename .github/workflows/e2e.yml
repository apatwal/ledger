name: E2E

# Run the Playwright end-to-end suite on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # --- Backend (FastAPI) deps ---
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: pip install -r requirements.txt

      # --- Frontend deps ---
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install frontend dependencies
        run: npm ci

      # --- Playwright browser (+ OS libs) ---
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Playwright starts the isolated stack itself (CI=true → reuseExistingServer
      # is false): backend :8001 with auth off + a throwaway SQLite DB, frontend
      # :3001 with the Clerk key blanked. No Neon, no secrets, no auth.
      - name: Run e2e tests
        run: npm run e2e

      # Publish the HTML report + traces on failure for debugging.
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
